name: IPTV Auto Merge
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install tools
        run: pip install iptv-checker

      - name: Run Script
        run: python merge.py

      - name: Commit & Push
        run: |
          git config user.name bot
          git config user.email bot@qq.com
          git add .
          git commit -m "auto update" -q || true
          git push